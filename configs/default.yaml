image: "creature.png"
description: "purple floating demon cyclops with horns"
extra_instruction: ""   # optional spatial/style hint appended to every prompt

llm:
  provider: openai        # openai | gemini | vllm
  model: gpt-4o
  base_url: null          # required for vllm, e.g. http://localhost:8000/v1
  temperature: 0.7        # LLM sampling temperature
  max_tokens: 4096        # max tokens in LLM response
  image_detail: low       # low | high | auto  (OpenAI/vLLM vision only; Gemini ignores this)

palette:
  size: 16                # number of colors extracted via k-means (ignored when system is set)
  system: null            # restrict to a system palette: pico8 | cga  (nes/snes/gameboy are stubs)
  kmeans_n_init: 10       # k-means restarts — higher is more stable but slower
  kmeans_seed: 42         # random seed for k-means reproducibility
  max_pixels: 50000       # pixels sampled from image before k-means (cap for speed)

optimizer:
  max_steps: 30           # total optimization steps to run
  grid_size: null         # null = let LLM pick from grid_presets; or force e.g. 32
  grid_presets: [8, 16, 32, 48, 64]   # candidate grid sizes offered to LLM when grid_size is null
  epsilon: 0.0            # probability of accepting a worse step (0.0 = pure greedy)
  cell_size: 16           # pixels per grid cell in rendered output images
  max_tool_calls: 30      # cap on tool calls the LLM may make per step
  change_penalty_threshold: 0.4   # fraction of pixels changed above which penalty kicks in
  change_penalty_weight: 0.5      # penalty per unit of change_ratio above threshold

clip:
  model: ViT-B-32         # open_clip model architecture
  pretrained: openai      # open_clip pretrained weights tag

output:
  gif_duration_ms: 200    # milliseconds per frame in the progression GIF

debug: false              # write debug.log with full prompts and raw LLM responses
