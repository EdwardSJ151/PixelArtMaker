# ─────────────────────────────────────────────────────────────────────────────
# INPUT
# ─────────────────────────────────────────────────────────────────────────────
image: "creature.png"                  # path to seed image (any PIL-readable format)
description: "purple floating demon cyclops with horns"  # text the LLM and CLIP optimize toward
extra_instruction: ""                  # raw text appended to every LLM prompt (no parsing/enforcement)

# ─────────────────────────────────────────────────────────────────────────────
# LLM
# ─────────────────────────────────────────────────────────────────────────────
llm:
  provider: openai        # openai | gemini | vllm
  model: gpt-4o           # model name passed to the provider (e.g. gemini-2.5-flash, Qwen2-VL-7B-Instruct)
  base_url: null          # vllm only: endpoint URL, e.g. http://localhost:8000/v1
  temperature: 0.7        # sampling temperature — lower = more deterministic
  max_tokens: 4096        # max tokens in each LLM response
  image_detail: low       # low | high | auto — OpenAI only; ignored for vllm and gemini

# ─────────────────────────────────────────────────────────────────────────────
# PALETTE
# ─────────────────────────────────────────────────────────────────────────────
palette:
  size: 16                # number of colors to extract via k-means (ignored when system is set)
  system: null            # use a fixed system palette instead: pico8 | cga  (nes/snes/gameboy are stubs)
  kmeans_n_init: 10       # how many times k-means reruns with different seeds — higher = more stable, slower
  kmeans_seed: 42         # random seed for k-means and pixel sampling — change for different color layouts
  max_pixels: 100000       # pixels sampled from the image before k-means — lower = faster but less accurate

# ─────────────────────────────────────────────────────────────────────────────
# OPTIMIZER
# ─────────────────────────────────────────────────────────────────────────────
optimizer:
  max_steps: 30                    # total number of LLM refinement steps to run
  resample: nearest                # filter used to shrink the seed image: nearest | box | lanczos | bilinear
  grid_size: null                  # null = LLM picks from grid_presets; set a number to force (e.g. 32)
  grid_presets: [8, 16, 32, 48, 64]  # candidate grid sizes offered to the LLM when grid_size is null
  epsilon: 0.0                     # probability of accepting a worse step — 0 = pure greedy, >0 = exploration
  cell_size: 16                    # pixels per grid cell in saved PNG/GIF output
  max_tool_calls: 30               # max tool calls the LLM can make in a single step
  history_length: 5                # past steps summarized and injected into each prompt (0 = disabled)
  change_penalty_threshold: 0.4    # fraction of pixels that can change before a score penalty applies
  change_penalty_weight: 0.5       # how much to penalize per unit of change above the threshold

# ─────────────────────────────────────────────────────────────────────────────
# CLIP SCORER
# ─────────────────────────────────────────────────────────────────────────────
clip:
  model: hf-hub:timm/ViT-B-16-SigLIP        # SigLIP B16 — recommended (better on stylized/pixel art)
  # model: hf-hub:timm/ViT-SO400M-14-SigLIP  # SigLIP SO400M — best quality, slower
  # model: ViT-B-32                           # classic CLIP — fastest, weakest on pixel art
  pretrained: ""          # leave empty for hf-hub models; set for standard CLIP (e.g. openai, laion2b_s34b_b79k)

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT
# ─────────────────────────────────────────────────────────────────────────────
output:
  gif_duration_ms: 200    # milliseconds per frame in the progression GIF

# ─────────────────────────────────────────────────────────────────────────────
# DEBUG
# ─────────────────────────────────────────────────────────────────────────────
debug: false              # true = write debug.log with full prompts and raw LLM responses per step
